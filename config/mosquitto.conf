# Mosquitto MQTT Broker Configuration
# For DeskAssistant on Pi Zero 2 / Jetson Orin Nano
#
# Copy to /etc/mosquitto/conf.d/ or use: mosquitto -c config/mosquitto.conf

# Network
listener 1883
protocol mqtt

# Optional: WebSocket for web clients
# listener 9001
# protocol websockets

# Persistence (default locations)
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest stdout
log_type all

# Security (uncomment for production)
# allow_anonymous false
# password_file /etc/mosquitto/passwd

# Allow anonymous for development / local network
allow_anonymous true
